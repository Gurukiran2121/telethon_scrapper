version: "3.9"

services:
  telethon_scrapper:
    build: .
    stdin_open: true
    tty: true
    restart: always
    # command: uv run -m src.main
    ports:
      - "8080:8080"
    depends_on:
      - mongo_db
    volumes:
      - .:/app
      - ./beyond-cloud-prod2-f59d438ab567.json:/app/gcs-key.json
    env_file:
      - .env

  mongo_db:
    image: mongo:7
    restart: always
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo_db
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root_admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=root_admin1010
      - ME_CONFIG_BASICAUTH_USERNAME=mongoexpressuser
      - ME_CONFIG_BASICAUTH_PASSWORD=mongoexpresspass
    depends_on:
      - mongo_db

volumes:
  mongo_data:
